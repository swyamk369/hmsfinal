# Render Blueprint for the free/demo deployment path.
# Keep real secrets in the Render dashboard prompts, not in this file.
services:
  - type: web
    name: hms-final-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    dockerCommand: sh -c "pnpm db:deploy && node apps/api/dist/main.js"
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: APP_DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://hms-final-web.onrender.com
      - key: THROTTLE_LIMIT
        value: '300'
      - key: THROTTLE_TTL_MS
        value: '60000'
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_MODEL
        value: gemini-1.5-flash
      - key: NOTIFICATION_DRY_RUN
        value: '1'
      - key: NOTIFICATION_TIMEOUT_MS
        value: '10000'

  - type: web
    name: hms-final-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /login
    autoDeployTrigger: checksPass
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hms-final-api.onrender.com
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
