services:
  postgres:
    image: postgres:16-alpine
    container_name: hms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hms
    ports:
      - "5433:5432"
    volumes:
      - hms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hms_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - hms_redisdata:/data

volumes:
  hms_pgdata:
  hms_redisdata:
